[tool.ruff]
exclude = [
    "app.py",      # Legacy monolithic file (replaced by app/ package)
    "helpers.py",  # Legacy helpers (replaced by Flask-Login + blueprints)
    "migrations/", # Auto-generated by Alembic
    "venv/",
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
