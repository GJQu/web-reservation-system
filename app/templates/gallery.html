{% extends "layout.html" %}

{% block title %}Gallery{% endblock %}

{% block main %}
    <div class="container mt-4">
        <h2 class="text-center mb-4">Gallery</h2>
        <div class="row">
            {% for image in images %}
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <div class="card">
                        <img src="{{ url_for('static', filename='images/portfolio/' + image.url.split('/')[-1]) }}" class="card-img-top img-fluid" alt="{{ image.alt }}">
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
